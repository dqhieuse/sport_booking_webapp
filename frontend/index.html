<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sport Booking WebApp frontend" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders:opsz,wght@10..72,100..900&display=swap" rel="stylesheet" />
    <title>Arenas — Book Your Court</title>
  </head>
  <body>
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('sport-booking-theme');
          var resolvedTheme = theme === 'light' || theme === 'dark' ? theme : 'dark';

          document.documentElement.classList.toggle('dark', resolvedTheme === 'dark');
          document.documentElement.dataset.theme = resolvedTheme;
        } catch (_) {
          document.documentElement.classList.add('dark');
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
