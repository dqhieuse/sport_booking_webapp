spring:
  datasource:
    url: jdbc:h2:mem:sport_booking_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 50
  flyway:
    enabled: true
    locations: classpath:db/migration/common

app:
  cors:
    allowed-origins:
      - http://localhost:5173
  storage:
    public-base-url: http://localhost:8080
    local:
      upload-dir: target/test-uploads
