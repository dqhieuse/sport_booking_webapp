spring:
    application:
        name: sport-booking-backend
    profiles:
        active: ${SPRING_PROFILES_ACTIVE:local}
    datasource:
        url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sport_booking}
        username: ${DB_USERNAME:sport_booking}
        password: ${DB_PASSWORD:sport_booking}
    jpa:
        hibernate:
            ddl-auto: validate
        open-in-view: false
        properties:
            hibernate:
                format_sql: true
    flyway:
        enabled: true
        locations: classpath:db/migration/common,classpath:db/migration/postgresql
    mail:
        host: ${SMTP_HOST:smtp.gmail.com}
        port: ${SMTP_PORT:587}
        username: ${SMTP_USERNAME:}
        password: ${SMTP_PASSWORD:}
        properties:
            mail:
                smtp:
                    auth: ${SMTP_AUTH:true}
                    starttls:
                        enable: ${SMTP_STARTTLS_ENABLE:true}

server:
    port: ${SERVER_PORT:8080}

app:
    cors:
        allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
    auth:
        jwt-secret: ${JWT_SECRET:local-dev-jwt-secret-change-before-production-32-bytes}
        access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
        refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:7d}
        email-verification-token-ttl: ${EMAIL_VERIFICATION_TOKEN_TTL:15m}
        issuer: ${JWT_ISSUER:sport-booking-backend}
        refresh-token-cookie-name: ${REFRESH_TOKEN_COOKIE_NAME:sportzone_refresh_token}
        refresh-token-cookie-path: ${REFRESH_TOKEN_COOKIE_PATH:/api/auth}
        refresh-token-cookie-secure: ${REFRESH_TOKEN_COOKIE_SECURE:false}
        refresh-token-cookie-same-site: ${REFRESH_TOKEN_COOKIE_SAME_SITE:Lax}
    mail:
        provider: ${APP_MAIL_PROVIDER:log}
        from-email: ${MAIL_FROM_EMAIL:dqhflearn@gmail.com}
        from-name: ${MAIL_FROM_NAME:SportZone}
        frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
        email-verify-path: ${EMAIL_VERIFY_PATH:/verify-email}

management:
    endpoints:
        web:
            exposure:
                include: health,info
