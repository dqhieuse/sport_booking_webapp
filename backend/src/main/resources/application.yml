spring:
    application:
        name: sport-booking-backend
    profiles:
        active: ${SPRING_PROFILES_ACTIVE:local}
    datasource:
        url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sport_booking}
        username: ${DB_USERNAME:sport_booking}
        password: ${DB_PASSWORD:sport_booking}
    jpa:
        hibernate:
            ddl-auto: validate
        open-in-view: false
        properties:
            hibernate:
                format_sql: true
    flyway:
        enabled: true
        locations: classpath:db/migration

server:
    port: ${SERVER_PORT:8080}

app:
    cors:
        allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
    endpoints:
        web:
            exposure:
                include: health,info
